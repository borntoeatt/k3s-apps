apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: valhalla-ca-issuer
    # Homepage's own Kubernetes integration discovers Ingresses via
    # these annotations and renders entries automatically — adding
    # them here means Homepage shows itself in its own dashboard.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Homepage"
    gethomepage.dev/description: "This dashboard"
    gethomepage.dev/group: "Platform"
    gethomepage.dev/icon: "homepage"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - home.valhalla.lan
      secretName: homepage-tls
  rules:
    - host: home.valhalla.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 80
