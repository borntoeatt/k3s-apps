apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      values: |
        # Match the controller name we'll use with kubeseal CLI later.
        # Without overriding this, the chart names it "sealed-secrets" and
        # we'd have to remember to pass --controller-name on every
        # kubeseal invocation.
        fullnameOverride: sealed-secrets-controller
        nodeSelector:
          node-role.kubernetes.io/worker: "true"
        # Resource caps — controller is small, ~30MB at idle.
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
