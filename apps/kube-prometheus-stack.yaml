apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.0
    helm:
      # The chart bundles a lot of CRDs (Prometheus, Alertmanager,
      # ServiceMonitor, PodMonitor, Probe, PrometheusRule, ThanosRuler,
      # ScrapeConfig). They're needed for the controllers to work.
      skipCrds: false
      values: |
        # Shorter prefix on every resource it creates. "kube-prometheus-stack"
        # gets long fast in pod names.
        fullnameOverride: kps

        # Prometheus: storage on Longhorn, 15-day retention, scrape any
        # ServiceMonitor in the cluster (default is to only scrape ones
        # with a matching helm-release label, which is too restrictive).
        prometheus:
          prometheusSpec:
            nodeSelector:
              node-role.kubernetes.io/worker: "true"
            retention: 15d
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # By default the operator only watches ServiceMonitors created
            # alongside this Helm release. Setting these to false makes it
            # discover everything in the cluster — way more useful for a
            # homelab where you want one Prometheus to monitor everything.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            scrapeConfigSelectorNilUsesHelmValues: false

        # Alertmanager: tiny PVC, just for notification dedup state.
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              node-role.kubernetes.io/worker: "true"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # Grafana: persistent dashboards on Longhorn, ingress via
        # cert-manager. Admin password is auto-generated by the chart on
        # first install — we'll fetch it via kubectl below.
        grafana:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
          persistence:
            enabled: true
            type: pvc
            storageClassName: longhorn
            size: 5Gi
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              cert-manager.io/cluster-issuer: valhalla-ca-issuer
            hosts:
              - grafana.valhalla.lan
            tls:
              - hosts:
                  - grafana.valhalla.lan
                secretName: grafana-tls
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Bring in the bulk of community-popular dashboards. The chart
          # bundles dashboards for the kube-* metrics; this enables
          # node-exporter dashboards too.
          defaultDashboardsEnabled: true

        prometheusOperator:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        kube-state-metrics:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"

        # node-exporter has to run on every node — including the tainted
        # control-plane servers — to scrape per-host metrics. Universal
        # tolerations let it land everywhere.
        prometheus-node-exporter:
          tolerations:
            - effect: NoSchedule
              operator: Exists
            - effect: NoExecute
              operator: Exists

        # Disable cluster components we don't actually run. k3s embeds the
        # control plane into the k3s binary, so there's no separate
        # kube-controller-manager/scheduler/etcd/proxy pod to scrape — the
        # default ServiceMonitors for these will alert "endpoint missing"
        # forever. Disabling avoids the noise.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # CRDs in this chart sometimes exceed the 256KB last-applied
      # annotation limit; ServerSideApply handles it but if not we'd need
      # this. Belt and suspenders.
      - Replace=false
